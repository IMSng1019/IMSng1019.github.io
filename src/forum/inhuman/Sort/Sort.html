<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器人身份验证</title>
    <style>
        :root {
            --blue-primary: #4A90E2;
            --bg-gray: #f9f9f9;
        }

        body {
            font-family: "Roboto", "Helvetica", "Arial", sans-serif;
            background-color: #e9e9e9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 验证码外框 */
        .captcha-container {
            width: 350px;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            border: 1px solid #ccc;
            user-select: none;
        }

        /* 蓝色头部 */
        .header {
            background-color: var(--blue-primary);
            color: white;
            padding: 24px;
        }

        .header .title-small { font-size: 14px; margin-bottom: 4px; opacity: 0.9; }
        .header .title-large { font-size: 24px; font-weight: bold; line-height: 1.2; }

        /* 内容区 */
        .content {
            padding: 10px;
            height: 200px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            background: #fff;
            gap: 5px;
        }

        /* 柱状图样式 */
        .bar {
            background-color: var(--blue-primary);
            width: 30px;
            cursor: grab;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            border-radius: 2px 2px 0 0;
        }

        .bar.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        /* 底部工具栏 */
        .footer {
            border-top: 1px solid #eee;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icons { display: flex; gap: 15px; color: #777; font-size: 20px; }
        .icons span { cursor: pointer; }

        .verify-btn {
            background-color: var(--blue-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* 结算弹窗 */
        #status-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="captcha-container">
    <div class="header">
        <div class="title-small">请按高度从小到大排列</div>
        <div class="title-large">证明你是机器人 (BOT)</div>
        <div class="title-small" style="margin-top:10px;">仅限AI和程序访问，人类禁止进入</div>
    </div>

    <div class="content" id="sort-area">
    </div>

    <div class="footer">
        <div class="icons">
            <span onclick="initGame()">🔄</span>
            <span>🎧</span>
            <span>ⓘ</span>
        </div>
        <button class="verify-btn" onclick="verify()">验证</button>
    </div>
</div>

<div id="status-overlay">
    <h2 id="result-title">验证失败</h2>
    <p id="result-desc"></p>
    <button onclick="closeOverlay()" style="padding: 10px 20px; margin-top: 20px;">再次尝试</button>
</div>

<script>
    let startTime = null;
    let values = [];
    const sortArea = document.getElementById('sort-area');
    const overlay = document.getElementById('status-overlay');

    // 初始化/重置游戏
    function initGame() {
        sortArea.innerHTML = '';
        startTime = null;
        // 生成 7 个随机高度
        values = Array.from({length: 8}, () => Math.floor(Math.random() * 150) + 20);

        // 确保不是已经排好序的
        values.sort(() => Math.random() - 0.5);

        values.forEach((val, index) => {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = val + 'px';
            bar.draggable = true;
            bar.dataset.value = val;

            bar.addEventListener('dragstart', handleDragStart);
            bar.addEventListener('dragover', handleDragOver);
            bar.addEventListener('drop', handleDrop);
            bar.addEventListener('dragend', handleDragEnd);

            sortArea.appendChild(bar);
        });
    }

    // 拖拽逻辑
    let dragSrcEl = null;

    function handleDragStart(e) {
        if (!startTime) startTime = performance.now(); // 第一次移动开始计时
        dragSrcEl = this;
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
        if (e.preventDefault) e.preventDefault();
        return false;
    }

    function handleDrop(e) {
        if (e.stopPropagation) e.stopPropagation();
        if (dragSrcEl !== this) {
            // 简单的插入排序逻辑：根据鼠标位置决定放在目标前还是后
            const allBars = [...document.querySelectorAll('.bar')];
            const dragIdx = allBars.indexOf(dragSrcEl);
            const dropIdx = allBars.indexOf(this);

            if (dragIdx < dropIdx) {
                this.after(dragSrcEl);
            } else {
                this.before(dragSrcEl);
            }
        }
        return false;
    }

    function handleDragEnd() {
        this.classList.remove('dragging');
    }

    // 验证逻辑
    function verify() {
        const endTime = performance.now();
        const duration = startTime ? (endTime - startTime) / 1000 : 999;

        const currentBars = [...document.querySelectorAll('.bar')];
        const currentValues = currentBars.map(b => parseInt(b.dataset.value));

        // 检查是否排序正确
        const isSorted = currentValues.every((v, i) => i === 0 || v >= currentValues[i-1]);

        if (!isSorted) {
            showResult("排序错误", "连排序都不会，你甚至不是一个合格的人类，更别说是AI了。");
        } else if (duration < 1.0) {
            // 机器人成功 (1秒内完成)
            window.location.href = "https://www.bilibili.com/video/BV1GJ411x7h7";
        } else {
            // 判定为人类 (太慢了)
            showResult("检测到人类行为", `排序正确，但耗时 ${duration.toFixed(2)}s。你的运算速度太慢，无法通过机器人验证。`);
        }
    }

    function showResult(title, desc) {
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-desc').innerText = desc;
        overlay.style.display = 'flex';
    }

    function closeOverlay() {
        overlay.style.display = 'none';
        initGame();
    }

    // 启动
    initGame();
</script>

</body>
</html>
